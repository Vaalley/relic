# Relic Android intent template — Dolphin (GameCube / Wii).
# Spec: docs/android-intents.md. Status: Draft, Phase 3.
#
# Interface confirmed by research (docs/android-standalone-emulators.md §2.2):
# MainActivity does NOT export a VIEW intent-filter — launching is MAIN plus
# the "AutoStartFile" string extra carrying a content:// URI (bare paths only
# work on legacy pre-scoped-storage builds). Sources: dolphin-emu/dolphin
# PR #10272, pegasus-frontend #1096, Daijishou #640. Still needs a real-device
# pass before Verified status (docs/android-intents.md §7).
#
# Dolphin targets GameCube and Wii, which are not yet in core/data/systems/
# (no "gamecube" or "wii" slug exists). This template therefore ships without
# per_system overrides; it will gain per_system.gamecube / per_system.wii keys
# when those systems are added to the registry.

id = "dolphin"
display_name = "Dolphin"
package = "org.dolphinemu.dolphinemu"
activity = "org.dolphinemu.dolphinemu.ui.main.MainActivity"
action = "android.intent.action.MAIN"
data_mode = "extra"
data_extra_name = "AutoStartFile"

flags = [
  "FLAG_ACTIVITY_NEW_TASK",
  "FLAG_ACTIVITY_CLEAR_TOP",
]

[[extras]]
name = "AutoStartFile"
type = "string"
value = "{rom_uri}"

# UNVERIFIED - needs device testing: min_version_code not set because the
# minimum Dolphin version that accepts this intent is unknown. Return-to-caller
# behavior is also undocumented (no QUITFOCUS equivalent) — rely on the
# session watchdog.

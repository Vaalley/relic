# Relic Android intent template — melonDS (Android port).
# Spec: docs/android-intents.md. Status: Draft, Phase 3.
#
# Interface per research (docs/android-standalone-emulators.md §2.7):
# package me.magnum.melonds, activity ui.emulator.EmulatorActivity, VIEW with
# the ROM as Intent.data — canonical per the melonDS-android README (the
# "uri"/"PATH" extras are deprecated fallbacks). Previous package/activity
# guesses (io.github.melonds.*, MainActivity) were wrong. NDS only (system
# slug "nds").

id = "melonds"
display_name = "melonDS"
package = "me.magnum.melonds"
activity = "me.magnum.melonds.ui.emulator.EmulatorActivity"
action = "android.intent.action.VIEW"
data_mode = "data"

flags = [
  "FLAG_ACTIVITY_NEW_TASK",
  "FLAG_ACTIVITY_CLEAR_TOP",
]

# No extras: melonDS reads the ROM from Intent.data. UX caveat: melonDS keeps
# saves next to the ROM only if its own SAF directory grant covers the folder;
# otherwise saves land in Android/data/me.magnum.melonds/files/saves.

# No per_system: this template targets only the "nds" slug.

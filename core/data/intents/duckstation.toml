# Relic Android intent template — DuckStation.
# Spec: docs/android-intents.md. Status: Draft, Phase 3.
# DuckStation accepts the ROM as Intent.data (a content:// URI) via a VIEW
# action on its MainActivity. PSX only (system slug "psx").

id = "duckstation"
display_name = "DuckStation"
package = "com.github.stenzek.duckstation"
activity = "com.github.stenzek.duckstation.MainActivity"
action = "android.intent.action.VIEW"
data_mode = "data"

flags = [
  "FLAG_ACTIVITY_NEW_TASK",
  "FLAG_ACTIVITY_CLEAR_TOP",
]

# No extras: DuckStation reads the ROM entirely from Intent.data.
# No per_system: this template targets only the "psx" slug.

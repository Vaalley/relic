name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # apps/desktop (Slint, winit/femtovg backend) needs these system dev
      # headers to build on Linux; nothing else in the workspace does.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxcb-xkb-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev libinput-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      # CLI end-to-end regression against the committed fixture library
      # (tools/e2e). pwsh is preinstalled on all GitHub runners.
      - name: e2e
        run: ./tools/e2e/run.ps1
        shell: pwsh

  offline-only:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Keeps the pure-T0 build honest (PLAN.md §3): core must build with no
      # online modules compiled in.
      - name: cargo build (offline-only)
        run: cargo build -p relic-core --no-default-features

  size-budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev libxcb-xkb-dev libxkbcommon-dev \
            libxkbcommon-x11-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev \
            libgl1-mesa-dev libegl1-mesa-dev libinput-dev libudev-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Binary-size budgets (PLAN.md §8): relic-capi cdylib < 4 MB,
      # relic-desktop binary < 20 MB.
      - name: size budgets
        run: ./tools/size-check/run.ps1
        shell: pwsh
